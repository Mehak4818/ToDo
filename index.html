<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>TO DO List</title>
  </head>
  <body>
    <h1>TO DO List</h1>
    <input type="text" id="task-input" placeholder="Enter Task" />

    <button id="myButton">Click</button>

    <div id="task-list"></div>
    <!-- <audio src="Slack - Incoming call.mp3" controls></audio> -->
    <iframe
      width="560"
      height="315"
      src="https://www.youtube.com/embed/GpQSUjNsNm0?si=j_JdAXmZbtMGkkom"
      title="YouTube video player"
      frameborder="0"
      allow="
        accelerometer;
        autoplay;
        clipboard-write;
        encrypted-media;
        gyroscope;
        picture-in-picture;
        web-share;
      "
      referrerpolicy="strict-origin-when-cross-origin"
      allowfullscreen
    ></iframe>

    <script src="script.js"></script>
  </body>
</html>
